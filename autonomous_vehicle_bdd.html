
<style>
#bdd-wrap { padding: 1rem 0; }
#bdd-wrap svg { width: 100% !important; height: auto !important; }
</style>
<div id="bdd-wrap"><div id="bdd"></div></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor:        dark ? '#1c2a3a' : '#E6F1FB',
    primaryBorderColor:  dark ? '#378ADD' : '#185FA5',
    primaryTextColor:    dark ? '#B5D4F4' : '#042C53',
    secondaryColor:      dark ? '#1a2e28' : '#E1F5EE',
    secondaryBorderColor:dark ? '#1D9E75' : '#0F6E56',
    secondaryTextColor:  dark ? '#9FE1CB' : '#04342C',
    tertiaryColor:       dark ? '#2a2218' : '#FAEEDA',
    tertiaryBorderColor: dark ? '#BA7517' : '#854F0B',
    tertiaryTextColor:   dark ? '#FAC775' : '#412402',
    lineColor:           dark ? '#9c9a92' : '#5F5E5A',
    textColor:           dark ? '#c2c0b6' : '#2C2C2A',
    edgeLabelBackground:dark ? '#1e1e1c' : '#f5f4f0',
    clusterBkg:          dark ? '#111' : '#fafafa',
    titleColor:          dark ? '#B5D4F4' : '#042C53',
    noteBkgColor:        dark ? '#2a2218' : '#FAEEDA',
    noteTextColor:       dark ? '#FAC775' : '#412402',
  },
  classDiagram: { diagramPadding: 20 }
});

const diagram = `classDiagram
    direction TB

    class AutonomousVehicle {
        <<block>>
        +controller : Controller
        +power : PowerSource
        +sensors : SensorArray
        +actuators : Actuators
    }

    class Controller {
        <<block · Arduino Uno>>
        +operatingVoltage : Real = 5.0 V
        +clockFrequency : Real = 16.0 MHz
        +[out] p_D8_TRIG_L : DigitalSignal
        +[in]  p_D9_ECHO_L : DigitalSignal
        +[out] p_D10_TRIG_R : DigitalSignal
        +[in]  p_D11_ECHO_R : DigitalSignal
        +[in]  p_D2_IR_L : DigitalSignal
        +[in]  p_D7_IR_R : DigitalSignal
        +[out] p_D5_IN1 : DigitalSignal
        +[out] p_D4_IN2 : DigitalSignal
        +[out] p_D2_IN3 : DigitalSignal
        +[out] p_5V_rail : VoltageSupply
        +[out] p_GND : Ground
    }

    class PowerSource {
        <<block · Battery Pack + Slide Switch>>
        +nominalVoltage : Real
        +switchState : Boolean
        +[out] p_VBATT_out : VoltageSupply
        +[out] p_5V_logic : VoltageSupply
        +[out] p_GND : Ground
    }

    class SensorArray {
        <<block>>
        +ultrasonicLeft : UltrasonicSensor
        +ultrasonicRight : UltrasonicSensor
        +irLeft : IRSensor
        +irRight : IRSensor
        +[in] p_VCC : VoltageSupply
        +[in] p_GND : Ground
    }

    class Actuators {
        <<block>>
        +motorDriver : MotorDriver
        +motorLeft : DCMotor
        +motorRight : DCMotor
    }

    class UltrasonicSensor {
        <<block · DISTULTRASONIC_1 and _2>>
        +sensorId : String
        +DISTULTRASONIC_1 : trigPin=D8, echoPin=D9
        +DISTULTRASONIC_2 : trigPin=D10, echoPin=D11
        +[in]  p_TRIG : DigitalSignal
        +[out] p_ECHO : DigitalSignal
        +[in]  p_VCC : VoltageSupply
        +[in]  p_GND : Ground
    }

    class IRSensor {
        <<block · UIR_1 and UIR_2>>
        +sensorId : String
        +UIR_1 : outPin=D2
        +UIR_2 : outPin=D7
        +[out] p_OUT : DigitalSignal
        +[in]  p_VCC : VoltageSupply
        +[in]  p_GND : Ground
    }

    class MotorDriver {
        <<block>>
        +in1Pin : Integer = 5
        +in2Pin : Integer = 4
        +in3Pin : Integer = 2
        +[in]  p_IN1 : DigitalSignal
        +[in]  p_IN2 : DigitalSignal
        +[in]  p_IN3 : DigitalSignal
        +[in]  p_VCC_5V : VoltageSupply
        +[in]  p_VCC_BATT : VoltageSupply
        +[in]  p_GND : Ground
        +[out] p_OUT_L : DriveSignal
        +[out] p_OUT_R : DriveSignal
    }

    class DCMotor {
        <<block · Left and Right>>
        +[in] p_DRIVE : DriveSignal
    }

    AutonomousVehicle *-- Controller : controller
    AutonomousVehicle *-- PowerSource : power
    AutonomousVehicle *-- SensorArray : sensors
    AutonomousVehicle *-- Actuators : actuators

    SensorArray *-- UltrasonicSensor : ultrasonicLeft + ultrasonicRight
    SensorArray *-- IRSensor : irLeft + irRight

    Actuators *-- MotorDriver : motorDriver
    Actuators *-- DCMotor : motorLeft + motorRight

    Controller ..> UltrasonicSensor : D8→TRIG_L · D9←ECHO_L · D10→TRIG_R · D11←ECHO_R
    Controller ..> IRSensor : D2←OUT_L · D7←OUT_R
    Controller ..> MotorDriver : D5→IN1 · D4→IN2 · D2→IN3
    PowerSource ..> MotorDriver : VBATT→VCC_BATT · 5V→VCC_5V
    MotorDriver ..> DCMotor : OUT_L→LEFT · OUT_R→RIGHT
`;

const { svg } = await mermaid.render('bdd-svg', diagram);
document.getElementById('bdd').innerHTML = svg;
</script>
